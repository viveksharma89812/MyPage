<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:45px;
    animation:fadeIn 2s ease-in-out;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#ff4b5c;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff1e40;
}

#message{
    margin-top:20px;
    font-size:22px;
    display:none;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

/* floating hearts */

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>Hey Beautiful 😊</h1>

<button onclick="showMessage()">Click Here</button>

<p id="message">
I don't know magic ✨ <br>
But whenever you smile 😊<br>
Everything feels perfect ❤️
</p>

</div>

<script>

function showMessage(){
document.getElementById("message").style.display="block";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
