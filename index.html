<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorry Dear</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(120deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 2;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 4rem;
            animation: glow 2s infinite alternate;
        }

        h2 {
            font-size: 2.5rem;
            margin-top: 10px;
            animation: slideUp 1.5s ease-out;
            color: #ffeb3b;
        }

        p {
            font-size: 1.4rem;
            margin-top: 15px;
            max-width: 600px;
            line-height: 1.6;
            animation: fadeIn 3s ease-in-out;
        }

        .heart {
            font-size: 4rem;
            margin-top: 20px;
            animation: heartbeat 1.5s infinite;
        }

        /* Floating hearts */
        .float {
            position: absolute;
            bottom: -50px;
            font-size: 2.5rem;
            animation: float 6s infinite ease-in;
            opacity: 0.8;
        }

        .float:nth-child(1) { left: 10%; animation-delay: 0s; }
        .float:nth-child(2) { left: 25%; animation-delay: 2s; }
        .float:nth-child(3) { left: 45%; animation-delay: 4s; }
        .float:nth-child(4) { left: 65%; animation-delay: 1s; }
        .float:nth-child(5) { left: 85%; animation-delay: 3s; }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff; }
            to { text-shadow: 0 0 30px #ff80ab, 0 0 50px #ff4081; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Floating Hearts -->
    <div class="float">💗</div>
    <div class="float">💖</div>
    <div class="float">💗</div>
    <div class="float">💖</div>
    <div class="float">💗</div>

    <!-- Main Content -->
    <div class="container">
        <h1>I'm Really Sorry 💔</h1>
        <h2>Dear Ma'am 🌸</h2>
        <p>
          💞 ................... 💞
        </p>
        <div class="heart">❤️</div>
    </div>

</body>
</html>
